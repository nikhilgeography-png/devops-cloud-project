name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: 13.49.245.246
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd devops-cloud-project
          git pull origin main
          docker stop devops-project || true
          docker rm devops-project || true
          docker build -t devops-project .
          docker run -d -p 8080:80 --name devops-project devops-project
